# ============================================================
# pharma-job-alert configuration
# Copy this file and fill in your values.
# Sensitive fields (API keys, passwords) can be set via
# environment variables — see comments per field.
# ============================================================

# Path to the SQLite deduplication database.
# In GitHub Actions this file is cached between runs.
db_path = "seen_jobs.db"

# Write all scraped jobs to this JSON file after each run.
# GitHub Actions commits this file → Vercel auto-deploys the updated web page.
[output]
json_path = "public/jobs.json"

# ----------------------------------------------------------
# Email delivery
# ----------------------------------------------------------
[email]
# Option A — SendGrid (recommended, free up to 100 emails/day)
# Set the real key via the SENDGRID_API_KEY environment variable
# or replace the placeholder below.
sendgrid_api_key = ""          # or set env var SENDGRID_API_KEY

# Option B — plain SMTP (e.g. Gmail app password)
# Leave smtp_host empty to use SendGrid instead.
smtp_host     = ""             # e.g. "smtp.gmail.com"
smtp_port     = 587
smtp_username = ""             # e.g. "you@gmail.com"
smtp_password = ""             # or set env var SMTP_PASSWORD

# Sender and recipient
from_address    = "alerts@yourdomain.com"
to_address      = "igor.cernak@gmail.com"   # Igor's email
subject_prefix  = "[PharmaAlert]"

# ----------------------------------------------------------
# Relevance filter — applied after scraping, before jobs.json is written.
# Jobs that don't match are silently dropped.
# ----------------------------------------------------------
[filter]
# Title must contain at least one of these (case-insensitive OR logic).
# Based on Igor's background: clinical ops, study management, trial execution.
title_contains_any = [
    "clinical trial",
    "clinical operation",
    "clinical project",
    "clinical research associate",
    "clinical monitor",
    "clinical lead",
    "study manager",
    "study director",
    "study operation",
    "trial manager",
    "trial lead",
    "trial leader",
    "trial director",
    "trial executive",
    "global study",
    "global trial",
    "site operation",
    "site manager",
    "site partnership",
    "vendor manager",
    "cro manager",
    "gcp",
    "outsourcing manager",
    "r&d outsourc",
]

# Title must NOT contain any of these (case-insensitive).
# Catches noise that slips through the keyword searches.
title_excludes_any = [
    "ict",
    "biostatistic",
    "statistician",
    "biomarker",
    "pharmacokinet",
    "pharmacologist",
    "manufacturing",
    "msat",
    "lab technician",
    "lab tech",
    " engineer",
    "scientist",
    "medical affair",
    "medical director",
    "medical science liaison",
    "regulatory submission",
    "regulatory strateg",
    "accountant",
    "controller",
    "intern",
    "cleaning",
    "logistik",
    "logistics specialist",
    "it business analyst",
    "software",
    "developer",
    "data science",
    "data analyst",
    "automation",
    "validation engineer",
    "facilities",
    "procurement",
    "market access",
    "sales",
    "key account",
]

# ----------------------------------------------------------
# Search parameters
# ----------------------------------------------------------
[search]
# Keywords Igor's roles would appear under on job boards.
# Each entry triggers a separate search on every board.
keywords = [
    "clinical operations",
    "global study manager",
    "clinical trial manager",
    "clinical project manager",
    "study director clinical",
    "clinical trial lead",
    "site operations manager",
    "GCP compliance manager",
    "CRO outsourcing manager",
]

# Location filter sent to all scrapers
location = "Basel, Switzerland"

# ----------------------------------------------------------
# Workday company portals (pharma companies using Workday ATS)
# To add a new company:
#   1. Visit their careers page and search for any job
#   2. The URL will look like:
#        https://{company_id}.wd3.myworkdayjobs.com/{portal}/jobs?q=...
#   3. Copy those two values into a new [[search.workday_companies]] block
# ----------------------------------------------------------

[[search.workday_companies]]
company_id   = "roche"
portal       = "roche-ext"
display_name = "Roche"

[[search.workday_companies]]
company_id   = "novartis"
portal       = "Novartis_Careers"
display_name = "Novartis"

[[search.workday_companies]]
company_id   = "lonza"
portal       = "Lonza_Careers"
display_name = "Lonza"

[[search.workday_companies]]
company_id   = "sanofi"
portal       = "SanofiCareers"
display_name = "Sanofi"

# J&J / Janssen — Allschwil is right next to Basel (uses wd5, not wd3)
[[search.workday_companies]]
company_id   = "jj"
portal       = "JJ"
wd_instance  = "wd5"
display_name = "Johnson & Johnson"

[[search.workday_companies]]
company_id   = "astrazeneca"
portal       = "Careers"
display_name = "AstraZeneca"

[[search.workday_companies]]
company_id   = "takeda"
portal       = "External"
display_name = "Takeda"

