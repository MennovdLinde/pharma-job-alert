# ============================================================
# pharma-job-alert configuration
# Copy this file and fill in your values.
# Sensitive fields (API keys, passwords) can be set via
# environment variables — see comments per field.
# ============================================================

# Write all scraped jobs to this JSON file after each run.
# GitHub Actions commits this file → Vercel auto-deploys the updated web page.
[output]
json_path = "public/jobs.json"

# ----------------------------------------------------------
# Relevance filter — applied after scraping, before jobs.json is written.
# Jobs that don't match are silently dropped.
# ----------------------------------------------------------
[filter]
# Job location must contain at least one of these (case-insensitive).
# Drops any job that isn't clearly based in Switzerland.
location_contains_any = [
    # Country names (all official languages + English)
    "switzerland",
    "schweiz",
    "suisse",
    "svizzera",
    # Major cities
    "basel",
    "zürich",
    "zurich",
    "geneva",
    "genève",
    "genf",
    "zug",
    "bern",
    "lausanne",
    "lugano",
    "luzern",
    "lucerne",
    "biel",
    "bienne",
    "visp",
    "baar",
    # Pharma cluster suburbs / campuses
    "allschwil",
    "kaiseraugst",
    "rotkreuz",
    "schlieren",
    "reinach",
    "bubendorf",
    "meyrin",
    "plan-les-ouates",
    "stein am rhein",
    "münchenbuchsee",
    # Swiss cantons (appear in Workday location strings)
    "aargau",
    "basel-stadt",
    "basel-land",
    "basel-country",
    "vaud",
    "valais",
    "wallis",
    "ticino",
    "zurich",
]

# Title must contain at least one of these (case-insensitive OR logic).
# Based on Igor's background: clinical ops, study management, trial execution.
title_contains_any = [
    # Clinical operations
    "clinical trial",
    "clinical operation",
    "clinical project",
    "clinical program",
    "clinical research associate",
    "clinical monitor",
    "clinical lead",
    "clinical quality",
    # Study roles
    "study manager",
    "study director",
    "study operation",
    "study lead",
    # Trial roles
    "trial manager",
    "trial lead",
    "trial leader",
    "trial director",
    "trial executive",
    "global study",
    "global trial",
    # Site & vendor management
    "site operation",
    "site manager",
    "site partnership",
    "vendor manager",
    "cro manager",
    "outsourcing manager",
    "r&d outsourc",
    # Compliance
    "gcp",
]

# Title must NOT contain any of these (case-insensitive).
# Catches noise that slips through the keyword searches.
title_excludes_any = [
    "ict",
    "biostatistic",
    "statistician",
    "biomarker",
    "pharmacokinet",
    "pharmacologist",
    "manufacturing",
    "msat",
    "lab technician",
    "lab tech",
    " engineer",
    "scientist",
    "medical affair",
    "medical director",
    "medical science liaison",
    "regulatory submission",
    "regulatory strateg",
    "accountant",
    "controller",
    "intern",
    "cleaning",
    "logistik",
    "logistics specialist",
    "it business analyst",
    "software",
    "developer",
    "data science",
    "data analyst",
    "automation",
    "validation engineer",
    "facilities",
    "procurement",
    "market access",
    "sales",
    "key account",
]

# ----------------------------------------------------------
# Search parameters
# ----------------------------------------------------------
[search]
# Keywords Igor's roles would appear under on job boards.
# Each entry triggers a separate search on every board.
keywords = [
    # Core role titles
    "clinical operations",
    "clinical project manager",
    "clinical trial manager",
    "clinical study manager",
    "clinical program manager",
    # Study/trial leadership
    "global study manager",
    "study director",
    "study lead",
    "trial lead",
    "trial manager",
    # Site & vendor operations
    "site operations manager",
    "site manager clinical",
    "vendor manager clinical",
    "CRO outsourcing",
    # Compliance
    "GCP compliance",
    "clinical quality",
]

# Location filter sent to all scrapers
location = "Basel, Switzerland"

# ----------------------------------------------------------
# Workday company portals (pharma companies using Workday ATS)
# To add a new company:
#   1. Visit their careers page and search for any job
#   2. The URL will look like:
#        https://{company_id}.wd3.myworkdayjobs.com/{portal}/jobs?q=...
#   3. Copy those two values into a new [[search.workday_companies]] block
# ----------------------------------------------------------

[[search.workday_companies]]
company_id   = "roche"
portal       = "roche-ext"
display_name = "Roche"

[[search.workday_companies]]
company_id   = "novartis"
portal       = "Novartis_Careers"
display_name = "Novartis"

[[search.workday_companies]]
company_id   = "lonza"
portal       = "Lonza_Careers"
display_name = "Lonza"

[[search.workday_companies]]
company_id   = "sanofi"
portal       = "SanofiCareers"
display_name = "Sanofi"

# J&J / Janssen — Allschwil is right next to Basel (uses wd5, not wd3)
[[search.workday_companies]]
company_id   = "jj"
portal       = "JJ"
wd_instance  = "wd5"
display_name = "Johnson & Johnson"

[[search.workday_companies]]
company_id   = "astrazeneca"
portal       = "Careers"
display_name = "AstraZeneca"

[[search.workday_companies]]
company_id   = "takeda"
portal       = "External"
display_name = "Takeda"

# Siegfried — CDMO, HQ Zofingen AG (Swiss) — wd103 instance
[[search.workday_companies]]
