<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pharma Job Alert — Project Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:   #0071e3;
      --accent-h: #0077ed;
      --bg:       #f5f5f7;
      --surface:  #ffffff;
      --border:   rgba(0,0,0,.08);
      --shadow-sm: 0 2px 8px rgba(0,0,0,.06);
      --shadow-md: 0 8px 30px rgba(0,0,0,.10);
      --shadow-lg: 0 20px 60px rgba(0,0,0,.13);
      --text-primary:   #1d1d1f;
      --text-secondary: #6e6e73;
      --text-tertiary:  #aeaeb2;
      --radius-card: 18px;
      --radius-sm:   10px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      background: rgba(255,255,255,.82);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 22px 32px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1160px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }
    .header-text {}
    h1 {
      font-size: 19px;
      font-weight: 600;
      letter-spacing: -.3px;
      color: var(--text-primary);
    }
    h1 span {
      font-weight: 300;
      color: var(--text-secondary);
    }
    .meta { margin-top: 3px; font-size: 12px; color: var(--text-tertiary); letter-spacing: .01em; }

    .stats { display: flex; gap: 28px; align-items: center; flex-wrap: wrap; }
    .stat { text-align: center; }
    .stat-num {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -.5px;
      color: var(--text-primary);
      line-height: 1;
    }
    .stat-label {
      margin-top: 3px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-tertiary);
      font-weight: 500;
    }

    /* ── Controls ── */
    .controls {
      max-width: 1160px;
      margin: 24px auto 0;
      padding: 0 32px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .search-row { display: flex; gap: 10px; align-items: center; }
    input[type="search"] {
      flex: 1;
      padding: 11px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: inherit;
      background: var(--surface);
      outline: none;
      box-shadow: var(--shadow-sm);
      color: var(--text-primary);
      transition: border-color .2s, box-shadow .2s;
    }
    input[type="search"]::placeholder { color: var(--text-tertiary); }
    input[type="search"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,113,227,.15);
    }

    .filters { display: flex; flex-wrap: wrap; gap: 7px; }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 12.5px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      color: var(--text-secondary);
      box-shadow: var(--shadow-sm);
      transition: all .18s;
      white-space: nowrap;
      letter-spacing: .01em;
    }
    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 2px 10px rgba(0,113,227,.14);
    }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 4px 14px rgba(0,113,227,.35);
    }
    .results-count {
      font-size: 12px;
      color: var(--text-tertiary);
      white-space: nowrap;
      margin-left: auto;
    }

    /* ── Job grid ── */
    .grid {
      max-width: 1160px;
      margin: 24px auto 60px;
      padding: 0 32px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 22px 22px 18px;
      display: flex;
      flex-direction: column;
      gap: 0;
      box-shadow: var(--shadow-sm);
      transition: box-shadow .25s, transform .2s;
      cursor: default;
    }
    .card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
    }

    .card-source-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .source-badge {
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
    }
    .card-date-top {
      font-size: 11px;
      color: var(--text-tertiary);
      font-weight: 400;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.35;
      letter-spacing: -.2px;
      margin-bottom: 6px;
    }
    .card-company {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .card-location {
      font-size: 12.5px;
      color: var(--text-tertiary);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .card-location svg {
      flex-shrink: 0;
      opacity: .5;
    }
    .card-snippet {
      margin-top: 10px;
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
      padding: 8px 10px;
      background: var(--bg);
      border-radius: 8px;
    }

    .card-footer {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid rgba(0,0,0,.05);
    }
    .apply-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 8px 18px;
      background: var(--accent);
      color: #fff;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      letter-spacing: .01em;
      box-shadow: 0 2px 8px rgba(0,113,227,.3);
      transition: background .18s, box-shadow .18s, transform .15s;
    }
    .apply-btn:hover {
      background: var(--accent-h);
      box-shadow: 0 4px 16px rgba(0,113,227,.45);
      transform: translateY(-1px);
    }
    .apply-btn:active { transform: translateY(0); }

    /* ── Source badge colours (muted, Apple-style) ── */
    .src-Pharmiweb  { background: rgba(251,191,36,.15);  color: #92400e; }
    .src-LinkedIn   { background: rgba(37,99,235,.1);    color: #1e40af; }
    .src-Indeed     { background: rgba(220,38,38,.1);    color: #991b1b; }
    .src-jobsch     { background: rgba(16,185,129,.12);  color: #065f46; }
    .src-Roche      { background: rgba(124,58,237,.1);   color: #5b21b6; }
    .src-Novartis   { background: rgba(219,39,119,.1);   color: #9d174d; }
    .src-Lonza      { background: rgba(14,165,233,.12);  color: #0c4a6e; }
    .src-Sanofi     { background: rgba(34,197,94,.12);   color: #14532d; }
    .src-Bayer               { background: rgba(234,179,8,.12);   color: #713f12; }
    .src-BioSpace            { background: rgba(168,85,247,.1);   color: #6b21a8; }
    .src-JohnsonJohnson      { background: rgba(239,68,68,.1);    color: #991b1b; }
    .src-AstraZeneca         { background: rgba(245,158,11,.12);  color: #78350f; }
    .src-Takeda              { background: rgba(20,184,166,.12);  color: #134e4a; }

    /* ── Empty / loading ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--text-tertiary);
      font-size: 15px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2.5px solid rgba(0,0,0,.08);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .65s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      header { padding: 16px 20px; }
      .stats { display: none; }
      .controls { padding: 0 20px; }
      .grid { grid-template-columns: 1fr; padding: 0 20px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-text">
      <h1>Pharma Job Alert <span>for project manager</span></h1>
      <div class="meta" id="meta">Loading…</div>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Jobs</div></div>
      <div class="stat"><div class="stat-num" id="stat-sources">—</div><div class="stat-label">Sources</div></div>
      <div class="stat"><div class="stat-num" id="stat-companies">—</div><div class="stat-label">Companies</div></div>
    </div>
  </div>
</header>

<div class="controls">
  <div class="search-row">
    <input type="search" id="search" placeholder="Search by title, company or location…" autocomplete="off" />
    <span class="results-count" id="results-count"></span>
  </div>
  <div class="filters" id="filters"></div>
</div>

<div class="grid" id="grid">
  <div class="empty"><div class="spinner"></div>Loading jobs…</div>
</div>

<script>
  let ALL_JOBS = [];
  let activeSource = 'All';

  // ── Fetch data ─────────────────────────────────────────────────────────
  fetch('jobs.json')
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(data => {
      ALL_JOBS = data.jobs || [];
      initPage(data);
    })
    .catch(() => {
      document.getElementById('grid').innerHTML =
        '<div class="empty">Could not load jobs.json — run the scraper first.</div>';
    });

  function initPage(data) {
    // Header meta
    const d = new Date(data.scraped_at);
    document.getElementById('meta').textContent =
      'Last updated: ' + d.toLocaleString('en-GB', { dateStyle:'long', timeStyle:'short' });

    // Stats
    const sources = [...new Set(ALL_JOBS.map(j => sourceName(j.source)))];
    const companies = [...new Set(ALL_JOBS.map(j => j.company))];
    document.getElementById('stat-total').textContent = ALL_JOBS.length;
    document.getElementById('stat-sources').textContent = sources.length;
    document.getElementById('stat-companies').textContent = companies.length;

    // Source filter buttons
    const filtersEl = document.getElementById('filters');
    ['All', ...sources.sort()].forEach(src => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (src === 'All' ? ' active' : '');
      btn.textContent = src === 'All' ? `All (${ALL_JOBS.length})` : src;
      btn.dataset.source = src;
      btn.addEventListener('click', () => {
        activeSource = src;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
      filtersEl.appendChild(btn);
    });

    // Search
    document.getElementById('search').addEventListener('input', render);

    render();
  }

  // ── Render ─────────────────────────────────────────────────────────────
  function render() {
    const q = document.getElementById('search').value.trim().toLowerCase();
    const jobs = ALL_JOBS.filter(j => {
      if (activeSource !== 'All' && sourceName(j.source) !== activeSource) return false;
      if (q) {
        const hay = `${j.title} ${j.company} ${j.location}`.toLowerCase();
        return hay.includes(q);
      }
      return true;
    });

    document.getElementById('results-count').textContent =
      jobs.length === ALL_JOBS.length ? '' : `${jobs.length} of ${ALL_JOBS.length}`;

    const grid = document.getElementById('grid');
    if (jobs.length === 0) {
      grid.innerHTML = '<div class="empty">No jobs match your filters.</div>';
      return;
    }

    grid.innerHTML = jobs.map(job => {
      const src = sourceName(job.source);
      const srcClass = 'src-' + src.replace(/[^a-zA-Z0-9]/g, '');
      const posted = job.posted_at ? escHtml(job.posted_at) : '';
      const snippet = job.description_snippet
        ? `<div class="card-snippet">${escHtml(job.description_snippet)}</div>` : '';
      return `
        <div class="card">
          <div class="card-source-row">
            <span class="source-badge ${srcClass}">${escHtml(src)}</span>
            <span class="card-date-top">${posted}</span>
          </div>
          <div class="card-title">${escHtml(job.title)}</div>
          <div class="card-company">${escHtml(job.company)}</div>
          <div class="card-location">
            <svg width="11" height="13" viewBox="0 0 11 13" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M5.5 0C3.015 0 1 2.015 1 4.5c0 3.375 4.5 8.5 4.5 8.5S10 7.875 10 4.5C10 2.015 7.985 0 5.5 0zm0 6.125A1.625 1.625 0 1 1 5.5 2.875a1.625 1.625 0 0 1 0 3.25z" fill="currentColor"/>
            </svg>
            ${escHtml(job.location || '—')}
          </div>
          ${snippet}
          <div class="card-footer">
            <a class="apply-btn" href="${escHtml(job.url)}" target="_blank" rel="noopener">
              Apply
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1 9L9 1M9 1H3M9 1V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </a>
          </div>
        </div>`;
    }).join('');
  }

  // Strip "(Careers)" suffix so filter chips stay short: "Roche" not "Roche (Careers)"
  function sourceName(raw) {
    return (raw || '').replace(/\s*\(Careers\)\s*$/, '').trim();
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
