name: Daily Pharma Job Alert

on:
  # Runs at 08:00 Zürich time (UTC+2 in summer = 06:00 UTC)
  schedule:
    - cron: "0 6 * * *"
  # Allow manual runs from the GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape-and-alert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # Cache the Rust build artifacts to keep subsequent runs fast (~2 min → ~30 sec)
      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build (release)
        run: cargo build --release

      - name: Run scraper
        env:
          RUST_LOG: info
        run: ./target/release/pharma-job-alert

      # Commit updated jobs.json so Vercel redeploys the web page automatically.
      # [skip ci] prevents this commit from triggering another workflow run.
      - name: Commit updated jobs.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/jobs.json
          git diff --staged --quiet || git commit -m "chore: update jobs.json $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          git push
